name: Deploy Frontend

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - frontend/**
      - .github/workflows/deploy-frontend.yml

concurrency:
  group: deploy-frontend
  cancel-in-progress: true

env:
  SSH_PORT: ${{ secrets.FRONTEND_SSH_PORT != '' && secrets.FRONTEND_SSH_PORT || '22' }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Write production env file
        if: ${{ secrets.FRONTEND_ENV_FILE != '' }}
        run: printf '%s' "${{ secrets.FRONTEND_ENV_FILE }}" > .env.production

      - name: Build
        run: npm run build

      - name: Setup SSH key
        shell: bash
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.FRONTEND_SSH_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -p "${SSH_PORT}" -H "${{ secrets.FRONTEND_SSH_HOST }}" >> ~/.ssh/known_hosts

      - name: Ensure frontend directory exists
        shell: bash
        run: |
          ssh -p "${SSH_PORT}" "${{ secrets.FRONTEND_SSH_USER }}@${{ secrets.FRONTEND_SSH_HOST }}" \
            "mkdir -p '${{ secrets.FRONTEND_DEPLOY_PATH }}'"

      - name: Upload built assets
        shell: bash
        run: |
          rsync -az --delete -e "ssh -p ${SSH_PORT}" \
            dist/ \
            "${{ secrets.FRONTEND_SSH_USER }}@${{ secrets.FRONTEND_SSH_HOST }}:${{ secrets.FRONTEND_DEPLOY_PATH }}/"

      - name: Optional post deploy command
        shell: bash
        working-directory: .
        env:
          POST_DEPLOY_CMD: ${{ secrets.FRONTEND_POST_DEPLOY_CMD }}
        run: |
          if [ -n "$POST_DEPLOY_CMD" ]; then
            ssh -p "${SSH_PORT}" "${{ secrets.FRONTEND_SSH_USER }}@${{ secrets.FRONTEND_SSH_HOST }}" "$POST_DEPLOY_CMD"
          fi
